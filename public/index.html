<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shani Bot Setup</title>
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
       .box { background: #1a1a1a; padding: 30px; border-radius: 12px; text-align: center; width: 90%; max-width: 400px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; }
        button { background: #25D366; color: #fff; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Shani Bot 🤖</h2>
        <p>Owner Number Save Karo</p>
        <input type="text" id="number" placeholder="923001234567">
        <button onclick="saveNumber()">Save Owner Number</button>
        <p id="msg" style="margin-top:15px;"></p>
    </div>
    <script>
        async function saveNumber() {
            const num = document.getElementById('number').value;
            const res = await fetch('/save-owner', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({number: num}) });
            const data = await res.json();
            document.getElementById('msg').innerText = data.message + ' Ab Vercel Logs check karo 🔥';
        }
    </script>
</body>
</html>
